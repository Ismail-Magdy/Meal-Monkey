name: meal_monkey
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  otp_pin_field: ^1.3.1
  flutter_svg: ^2.2.1
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.2.0
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  flutter_localization: ^0.3.3
  responsive_builder: ^0.7.1
  google_maps_flutter: ^2.13.1
  custom_map_markers: ^0.0.2+1
  geolocator: ^14.0.2
  http: ^1.5.0
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/Metropolis-Regular.otf
        - asset: assets/fonts/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Metropolis-Bold.otf
          weight: 700
        - asset: assets/fonts/Metropolis-ExtraBold.otf
          weight: 800
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
